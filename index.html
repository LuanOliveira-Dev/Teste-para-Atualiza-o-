<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Validade - Banco na Nuvem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="has-nav">

<div class="container">
    <h2><img src="logo512x512.png" alt="Logo Web Validade"></h2>

    <div id="auth-section" class="auth-box">
        <div id="register-fields" class="hidden">
            <input type="text" id="nome_usuario" placeholder="Nome de Usuário">
        </div>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btn-login" class="btn-primary">ENTRAR</button>
        <button id="btn-toggle-reg" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:14px;">Não tenho conta? Cadastrar</button>
    </div>

    <div id="app-section" class="hidden">
        
        <div id="tab-inicio">
            <div class="user-info">
                <span>👋 Olá, <span id="display-user-name"></span></span>
                <button id="btn-logout" style="width:auto; padding: 4px 8px; font-size: 11px;">Sair</button>
            </div>

            <div class="db-section">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <span style="font-weight: bold; font-size: 13px;">☁️ Banco de Dados</span>
                    <span id="statusCloud" class="cloud-badge">Sincronizando...</span>
                </div>
            </div>
            
            <button class="btn-primary" id="btnScan">📷 ESCANEAR CÓDIGO</button>
            <div id="reader"></div>

            <form id="formEstoque">
                <input type="text" id="codigo" placeholder="Código de Barras" required>
                <input type="text" id="descricao" placeholder="Nome do Produto" required>
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="validade" placeholder="Data de Validade" style="flex:1.5" required>
                    <input type="number" id="quantidade" placeholder="Qtd" style="flex:1" required>
                </div>
                <button type="submit" class="btn-success">SALVAR COLETA</button>
            </form>
            <div id="listaProdutos" style="margin-top:20px;"></div>
        </div>

        <div id="tab-setores" class="hidden">
            <div class="top-bar-black">
                <button class="btn-icon-top" id="btn-back-home">←</button>
                <span class="top-title">SETORES</span>
                <div class="top-actions">
                    <button class="btn-icon-top" id="btn-open-modal-setor">+</button>
                    <button class="btn-icon-top" id="btn-clear-all-setores">🗑️</button>
                </div>
            </div>
            <div id="lista-setores-render" class="setores-list">
                </div>
        </div>
    </div>
</div>

<div id="modal-setor" class="modal hidden">
    <div class="modal-content">
        <h3>Novo Setor</h3>
        <input type="text" id="input-nome-setor" placeholder="Nome do setor (ex: Padaria)">
        <div class="modal-buttons">
            <button id="btn-confirm-setor" class="btn-success">ADICIONAR</button>
            <button id="btn-close-modal" class="btn-danger">CANCELAR</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active" id="nav-link-inicio">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Início</span>
    </a>
    <a href="#" class="nav-item" id="nav-link-setores">
        <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M20 4H4v2h16V4zm1 10V8l-1-1H4L3 8v6c0 1.1.9 2 2 2h10v-2H5v-4h14v4h-2v2h2c1.1 0 2-.9 2-2zM9 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7 14h10V7H7v7z"/>
            </svg>
        </span>
        <span class="nav-label">Setores</span>
    </a>
    <a href="#" class="nav-item">
        <span class="nav-icon">❤️</span>
        <span class="nav-label">Favoritos</span>
    </a>
    <a href="#" class="nav-item">
        <span class="nav-icon">🛍️</span>
        <span class="nav-label">Sacola</span>
    </a>
    <a href="#" class="nav-item">
        <div class="profile-wrapper">
            <span class="nav-icon">👤</span>
            <span class="badge">7</span>
        </div>
        <span class="nav-label">Sua conta</span>
    </a>
</nav>

<script type="module" src="script.js"></script>
</body>
</html>
